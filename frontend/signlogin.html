<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدخول - Mosa3id Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0052cc;
            --dark-blue: #071e3d;
            --light-blue: #f0f7ff;
            --accent-cyan: #00d4ff;
            /* خلفية أقل إظلاماً وأكثر تناسقاً */
            --bg-dark-slate: #1a2a3a; 
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* تدرج رمادي ليلي هادئ وليس أسوداً */
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        /* شريط التنقل بلون أفتح وأكثر تناسقاً مع تأثير الزجاج */
        nav {
            background: rgba(255, 255, 255, 0.85); /* لون فاتح كما طلبت */
            backdrop-filter: blur(12px); /* إعادة تأثير الزجاج */
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--dark-blue); font-size: 14px; font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary-blue); }
        
        .nav-left { display: flex; gap: 15px; align-items: center; }
        .btn-home { border: 2px solid var(--primary-blue); padding: 5px 18px; border-radius: 8px; color: var(--primary-blue); text-decoration: none; font-size: 14px; font-weight: 700; transition: 0.3s; }
        .btn-home:hover { background: var(--primary-blue); color: white; }

        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 25px; height: 3px; background: var(--primary-blue); border-radius: 2px; }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .tab-group {
            display: flex;
            margin-bottom: 30px;
            background: var(--light-blue);
            padding: 5px;
            border-radius: 14px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 800;
            border-radius: 10px;
            transition: 0.3s;
            color: var(--dark-blue);
        }

        .tab.active { background: white; color: var(--primary-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; color: var(--dark-blue); }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e8ef;
            border-radius: 12px;
            font-family: 'Cairo';
            transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary-blue); outline: none; }

        .btn-auth {
            width: 100%;
            padding: 16px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-auth:hover { background: var(--dark-blue); transform: translateY(-2px); }

        .forgot-pass {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #666;
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 75px;
                right: 5%;
                left: 5%;
                background: white;
                padding: 25px;
                border-radius: 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            }
            .nav-links.active { display: flex; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <a href="/" class="btn-home" data-key="nav-home">الرئيسية</a>
            <select id="langSwitcher" onchange="changeLanguage()" style="border:none; font-family: 'Cairo'; cursor:pointer; background:none; font-weight:bold; color: var(--primary-blue);">
                <option value="ar">AR</option>
                <option value="en">EN</option>
                <option value="fr">FR</option>
            </select>
        </div>

        <div class="nav-right">
            <div class="hamburger" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="/#contact" data-key="nav-contact">تواصل معنا</a>
                <a href="#" data-key="nav-help">مساعدة؟</a>
            </div>
            <div style="font-size: 26px; font-weight: 800; color: var(--primary-blue);" data-key="brand">مساعد</div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="tab-group">
                <div class="tab active" onclick="switchTab('login', this)" data-key="tab-login">تسجيل الدخول</div>
                <div class="tab" onclick="switchTab('signup', this)" data-key="tab-signup">حساب جديد</div>
            </div>

            <form id="login-form" class="auth-form active" onsubmit="return validateAndSubmit(event, 'login')">
                <div class="form-group">
                    <label data-key="lbl-email">البريد الإلكتروني</label>
                    <input type="email" placeholder="student@gmail.com" required>
                </div>
                <div class="form-group">
                    <label data-key="lbl-pass">كلمة المرور</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth" data-key="btn-login-action">دخول</button>
                <a href="#" class="forgot-pass" data-key="forgot">نسيت كلمة المرور؟</a>
            </form>

            <form id="signup-form" class="auth-form" onsubmit="return validateAndSubmit(event, 'signup')">
                <div class="form-group">
                    <label data-key="lbl-name">الاسم الكامل</label>
                    <input type="text" placeholder="BARAA MOHAMED" required>
                </div>
                <div class="form-group">
                    <label data-key="lbl-email">البريد الإلكتروني</label>
                    <input type="email" placeholder="student@gmail.com" required>
                </div>
                <div class="form-group">
                    <label data-key="lbl-pass">كلمة المرور</label>
                    <input type="password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn-auth" data-key="btn-signup-action">إنشاء حساب</button>
            </form>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
        }

        function switchTab(type, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(type + '-form').classList.add('active');
        }

        function validateAndSubmit(event, type) {
            event.preventDefault();
            const lang = document.getElementById("langSwitcher").value;
            const success = { ar: "تم بنجاح", en: "Success", fr: "Réussi" };
            alert(success[lang]);
            return true;
        }

        const translations = {
            ar: { 
                dir: "rtl", brand: "مساعد", "nav-home": "الرئيسية", "nav-contact": "تواصل معنا", 
                "nav-help": "مساعدة؟", "tab-login": "تسجيل الدخول", "tab-signup": "حساب جديد",
                "lbl-email": "البريد الإلكتروني", "lbl-pass": "كلمة المرور", "lbl-name": "الاسم الكامل",
                "btn-login-action": "دخول", "btn-signup-action": "إنشاء حساب", "forgot": "نسيت كلمة المرور؟"
            },
            en: { 
                dir: "ltr", brand: "Mosa3id", "nav-home": "Home", "nav-contact": "Contact", 
                "nav-help": "Help?", "tab-login": "Login", "tab-signup": "Register",
                "lbl-email": "Email Address", "lbl-pass": "Password", "lbl-name": "Full Name",
                "btn-login-action": "Login", "btn-signup-action": "Create Account", "forgot": "Forgot Password?"
            },
            fr: { 
                dir: "ltr", brand: "Mosa3id", "nav-home": "Accueil", "nav-contact": "Contact", 
                "nav-help": "Aide?", "tab-login": "Connexion", "tab-signup": "Inscription",
                "lbl-email": "E-mail", "lbl-pass": "Mot de passe", "lbl-name": "Nom Complet",
                "btn-login-action": "Se connecter", "btn-signup-action": "S'inscrire", "forgot": "Mot de passe oublié ?"
            }
        };

        function changeLanguage() {
            const lang = document.getElementById("langSwitcher").value;
            const data = translations[lang];
            document.documentElement.lang = lang;
            document.documentElement.dir = data.dir;
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (data[key]) el.textContent = data[key];
            });
        }
    </script>
</body>
</html>
